{{ define "main" }}
<div class="post-content">
  {{ .Content }}
</div>
{{ with .Params.projects }}
<section class="rocks">
  <p class="rocks-title">projects</p>
  {{ range . }}
  <div class="rocks-item">
    <a href="{{ .url }}">{{ .name }}</a>{{ with .desc }} <span class="rocks-desc">— {{ . }}</span>{{ end }}
  </div>
  {{ end }}
</section>
{{ end }}
{{ with .Params.rocks }}
<section class="rocks">
  <p class="rocks-title">rocks</p>
  {{ range . }}
  <div class="rocks-item">
    <a href="{{ .url }}">{{ .name }}</a>{{ with .desc }} <span class="rocks-desc">— {{ . }}</span>{{ end }}
  </div>
  {{ end }}
</section>
{{ end }}
{{ end }}
