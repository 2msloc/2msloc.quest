<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Params.author }}{{ else }}{{ .Title }} | {{ .Site.Params.author }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.author }}{{ end }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:type"  content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url"   content="{{ .Permalink }}">
{{ range .AlternativeOutputFormats -}}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Params.author }}">
{{ end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;700&family=Geist+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
<style>
  :root {
    --accent: {{ .Site.Params.accent }};
    --bg:     {{ .Site.Params.bg }};
    --fg:     {{ .Site.Params.fg }};
    --muted:  {{ .Site.Params.muted }};
    --border: {{ .Site.Params.border }};
    --code:   {{ .Site.Params.code }};
  }
</style>
